spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tarefas_db}
spring.datasource.username=${DATABASE_USERNAME:tarefas_user}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
